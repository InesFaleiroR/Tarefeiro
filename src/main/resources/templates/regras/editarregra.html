<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Regra | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">Tarefeiro</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/regras}" class="nav-link active"><i class="bi bi-lightning-charge-fill"></i><span>Regras</span></a>
        <a th:href="@{/eventos}" class="nav-link"><i class="bi bi-calendar-event-fill"></i><span>Eventos</span></a>
        <a th:href="@{/execucoes}" class="nav-link"><i class="bi bi-play-circle-fill"></i><span>Execuções</span></a>
        <a th:href="@{/ia}" class="nav-link"><i class="bi bi-stars"></i><span>IA Assistant</span></a>
        <div class="nav-divider"></div>
        <a th:href="@{/utilizadores/perfil}" class="nav-link"><i class="bi bi-person-fill"></i><span>Perfil</span></a>
        <a th:href="@{/logout}" class="nav-link nav-link-danger"><i class="bi bi-box-arrow-left"></i><span>Sair</span></a>
    </nav>
</div>
<div class="main-wrapper">
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <div class="topbar-left">
            <a th:href="@{/regras}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Regras</a>
            <h1 class="page-title">Editar Regra</h1>
        </div>
    </header>
    <div class="content-area">
        <div class="form-page-container">
            <form th:action="@{/regras/{id}/editar(id=${regraId})}" th:object="${regraDTO}" method="post" class="form-card">
                <div class="form-section">
                    <h3 class="form-section-title"><i class="bi bi-info-circle me-2"></i>Informações Gerais</h3>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label required">Nome da Regra</label>
                            <input type="text" th:field="*{nome}" class="form-input"/>
                            <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="field-error"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Prioridade (0-100)</label>
                            <input type="number" th:field="*{prioridade}" class="form-input" min="0" max="100"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Descrição</label>
                        <textarea th:field="*{descricao}" class="form-textarea" rows="2"></textarea>
                    </div>
                </div>
                <div class="form-section">
                    <h3 class="form-section-title"><i class="bi bi-funnel me-2"></i>Condição (SE)</h3>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label required">Tipo de Condição</label>
                            <select th:field="*{condicaoTipo}" class="form-select">
                                <option th:each="t : ${tiposCondicao}" th:value="${t.name()}" th:text="${t.descricao}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label required">Valor da Condição</label>
                            <input type="text" th:field="*{condicaoValor}" class="form-input"/>
                        </div>
                    </div>
                </div>
                <div class="form-section">
                    <h3 class="form-section-title"><i class="bi bi-play-circle me-2"></i>Ação (ENTÃO)</h3>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label required">Tipo de Ação</label>
                            <select th:field="*{acaoTipo}" class="form-select">
                                <option th:each="t : ${tiposAcao}" th:value="${t.name()}" th:text="${t.descricao}"></option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Configuração (JSON)</label>
                            <input type="text" th:field="*{acaoConfig}" class="form-input"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="check-label">
                            <input type="checkbox" th:field="*{ativa}"/>
                            <span>Regra ativa</span>
                        </label>
                    </div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-actions">
                    <a th:href="@{/regras}" class="btn btn-ghost">Cancelar</a>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-floppy-fill me-2"></i>Guardar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
