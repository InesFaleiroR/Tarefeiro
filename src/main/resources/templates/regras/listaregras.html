<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Regras | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">Tarefeiro</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/regras}" class="nav-link active"><i class="bi bi-lightning-charge-fill"></i><span>Regras</span></a>
        <a th:href="@{/eventos}" class="nav-link"><i class="bi bi-calendar-event-fill"></i><span>Eventos</span></a>
        <a th:href="@{/execucoes}" class="nav-link"><i class="bi bi-play-circle-fill"></i><span>Execuções</span></a>
        <a th:href="@{/ia}" class="nav-link"><i class="bi bi-stars"></i><span>IA Assistant</span></a>
        <div class="nav-divider"></div>
        <a th:href="@{/utilizadores/perfil}" class="nav-link"><i class="bi bi-person-fill"></i><span>Perfil</span></a>
        <a th:href="@{/logout}" class="nav-link nav-link-danger"><i class="bi bi-box-arrow-left"></i><span>Sair</span></a>
    </nav>
</div>
<div class="main-wrapper">
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <div class="topbar-left"><h1 class="page-title">Regras de Automação</h1></div>
        <div class="topbar-right">
            <a th:href="@{/regras/nova}" class="btn btn-primary btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Nova Regra
            </a>
            <div class="user-chip">
                <div class="user-avatar" th:text="${#strings.substring(utilizador.nome, 0, 1)}">U</div>
            </div>
        </div>
    </header>
    <div class="content-area">
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade-in">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${sucesso}"></span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()"><i class="bi bi-x-lg"></i></button>
        </div>

        <!-- Search -->
        <div class="search-bar">
            <form th:action="@{/regras}" method="get">
                <div class="search-input-wrap">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" name="q" th:value="${q}" class="search-input" placeholder="Pesquisar regras..."/>
                    <button type="submit" class="btn btn-ghost btn-sm">Pesquisar</button>
                    <a th:if="${q != null}" th:href="@{/regras}" class="btn btn-ghost btn-sm">Limpar</a>
                </div>
            </form>
        </div>

        <!-- Empty state -->
        <div th:if="${regras == null or regras.isEmpty()}" class="empty-state-large">
            <div class="empty-icon"><i class="bi bi-lightning-charge"></i></div>
            <h3>Ainda não tens regras</h3>
            <p>Cria a tua primeira regra de automação e deixa o Tarefeiro trabalhar por ti!</p>
            <a th:href="@{/regras/nova}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-2"></i>Criar Primeira Regra
            </a>
        </div>

        <!-- Regras grid -->
        <div th:unless="${regras == null or regras.isEmpty()}" class="regras-grid">
            <div th:each="regra : ${regras}" class="regra-card" th:classappend="${!regra.ativa} ? 'regra-inativa' : ''">
                <div class="regra-header">
                    <div class="regra-icon">
                        <i class="bi" th:classappend="${regra.acaoTipo == 'ARQUIVAR_EMAIL' ? 'bi-envelope-check' : (regra.acaoTipo == 'RESUMIR_LINK' ? 'bi-link-45deg' : (regra.acaoTipo == 'CRIAR_CHECKLIST' ? 'bi-check2-square' : 'bi-bell'))}"></i>
                    </div>
                    <div class="regra-status">
                        <span class="badge" th:class="${regra.ativa ? 'badge badge-success' : 'badge badge-secondary'}"
                              th:text="${regra.ativa ? 'Ativa' : 'Inativa'}">Ativa</span>
                    </div>
                </div>
                <div class="regra-body">
                    <h4 class="regra-nome" th:text="${regra.nome}">Nome</h4>
                    <p class="regra-desc" th:text="${regra.descricao ?: 'Sem descrição'}">Desc</p>
                    <div class="regra-rule">
                        <span class="rule-condition">SE: <strong th:text="${regra.condicaoValor}"></strong></span>
                        <i class="bi bi-arrow-right"></i>
                        <span class="rule-action">ENTÃO: <strong th:text="${regra.acaoTipo}"></strong></span>
                    </div>
                </div>
                <div class="regra-footer">
                    <span class="regra-stat"><i class="bi bi-play-fill"></i> <span th:text="${regra.execucoesTotal}">0</span> execuções</span>
                    <div class="regra-actions">
                        <a th:href="@{/regras/{id}(id=${regra.id})}" class="btn-icon" title="Ver detalhes">
                            <i class="bi bi-eye"></i>
                        </a>
                        <a th:href="@{/regras/{id}/editar(id=${regra.id})}" class="btn-icon" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:action="@{/regras/{id}/alternar(id=${regra.id})}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-icon" th:title="${regra.ativa ? 'Desativar' : 'Ativar'}">
                                <i class="bi" th:classappend="${regra.ativa ? 'bi-pause-circle' : 'bi-play-circle'}"></i>
                            </button>
                        </form>
                        <form th:action="@{/regras/{id}/excluir(id=${regra.id})}" method="post" style="display:inline"
                              onsubmit="return confirm('Tens a certeza que queres eliminar esta regra?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn-icon btn-icon-danger" title="Eliminar">
                                <i class="bi bi-trash3"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
