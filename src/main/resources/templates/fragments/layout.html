<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${titulo != null ? titulo + ' | O Tarefeiro' : 'O Tarefeiro'}">O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <th:block th:replace="${cssExtra}"></th:block>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">Tarefeiro</span>
    </div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link" th:classappend="${activePage == 'dashboard'} ? 'active' : ''">
            <i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span>
        </a>
        <a th:href="@{/regras}" class="nav-link" th:classappend="${activePage == 'regras'} ? 'active' : ''">
            <i class="bi bi-lightning-charge-fill"></i><span>Regras</span>
        </a>
        <a th:href="@{/eventos}" class="nav-link" th:classappend="${activePage == 'eventos'} ? 'active' : ''">
            <i class="bi bi-calendar-event-fill"></i><span>Eventos</span>
        </a>
        <a th:href="@{/execucoes}" class="nav-link" th:classappend="${activePage == 'execucoes'} ? 'active' : ''">
            <i class="bi bi-play-circle-fill"></i><span>Execuções</span>
        </a>
        <a th:href="@{/ia}" class="nav-link" th:classappend="${activePage == 'ia'} ? 'active' : ''">
            <i class="bi bi-stars"></i><span>IA Assistant</span>
        </a>
        <div class="nav-divider"></div>
        <a th:href="@{/utilizadores/perfil}" class="nav-link" th:classappend="${activePage == 'perfil'} ? 'active' : ''">
            <i class="bi bi-person-fill"></i><span>Perfil</span>
        </a>
        <a th:href="@{/logout}" class="nav-link nav-link-danger">
            <i class="bi bi-box-arrow-left"></i><span>Sair</span>
        </a>
    </nav>
</div>

<!-- MAIN CONTENT -->
<div class="main-wrapper">
    <!-- TOPBAR -->
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle">
            <i class="bi bi-list"></i>
        </button>
        <div class="topbar-left">
            <h1 class="page-title" th:text="${titulo != null ? titulo : 'Dashboard'}">Dashboard</h1>
        </div>
        <div class="topbar-right">
            <div class="notif-bell" th:if="${notificacoesCount != null and notificacoesCount > 0}">
                <a th:href="@{/dashboard}" class="btn-icon">
                    <i class="bi bi-bell-fill"></i>
                    <span class="badge-dot" th:text="${notificacoesCount}">0</span>
                </a>
            </div>
            <div class="user-chip">
                <div class="user-avatar" th:text="${#strings.substring(utilizador.nome, 0, 1)}">U</div>
                <span class="user-name" th:text="${utilizador.nome}">Utilizador</span>
            </div>
        </div>
    </header>

    <!-- ALERTS -->
    <div class="content-area">
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade-in">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${sucesso}"></span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>
        <div th:if="${erro}" class="alert alert-danger alert-dismissible fade-in">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${erro}"></span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <th:block th:replace="${content}"></th:block>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<th:block th:replace="${jsExtra}"></th:block>
</body>
</html>
