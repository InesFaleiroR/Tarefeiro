<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Perfil | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">Tarefeiro</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/regras}" class="nav-link"><i class="bi bi-lightning-charge-fill"></i><span>Regras</span></a>
        <a th:href="@{/eventos}" class="nav-link"><i class="bi bi-calendar-event-fill"></i><span>Eventos</span></a>
        <a th:href="@{/execucoes}" class="nav-link"><i class="bi bi-play-circle-fill"></i><span>Execuções</span></a>
        <a th:href="@{/ia}" class="nav-link"><i class="bi bi-stars"></i><span>IA Assistant</span></a>
        <div class="nav-divider"></div>
        <a th:href="@{/utilizadores/perfil}" class="nav-link active"><i class="bi bi-person-fill"></i><span>Perfil</span></a>
        <a th:href="@{/logout}" class="nav-link nav-link-danger"><i class="bi bi-box-arrow-left"></i><span>Sair</span></a>
    </nav>
</div>
<div class="main-wrapper">
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <div class="topbar-left"><h1 class="page-title">O Meu Perfil</h1></div>
    </header>
    <div class="content-area">
        <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade-in">
            <i class="bi bi-check-circle-fill me-2"></i><span th:text="${sucesso}"></span>
            <button type="button" class="alert-close" onclick="this.parentElement.remove()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="form-page-container">
            <div class="perfil-header-card">
                <div class="perfil-avatar" th:text="${#strings.substring(utilizador.nome, 0, 1)}">U</div>
                <div class="perfil-info">
                    <h2 th:text="${utilizador.nome}">Nome</h2>
                    <p th:text="${utilizador.email}">email</p>
                    <span class="badge" th:class="${utilizador.role == 'ADMIN' ? 'badge badge-warning' : 'badge badge-info'}" th:text="${utilizador.role}">USER</span>
                </div>
            </div>
            <form th:action="@{/utilizadores/perfil}" th:object="${dto}" method="post" class="form-card">
                <div class="form-section">
                    <h3 class="form-section-title"><i class="bi bi-person me-2"></i>Informações Pessoais</h3>
                    <div class="form-group">
                        <label class="form-label required">Nome Completo</label>
                        <input type="text" th:field="*{nome}" class="form-input"/>
                        <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-input" readonly style="opacity:0.6"/>
                        <small class="form-hint">O email não pode ser alterado.</small>
                    </div>
                </div>
                <div class="form-section">
                    <h3 class="form-section-title"><i class="bi bi-lock me-2"></i>Alterar Senha</h3>
                    <div class="form-group">
                        <label class="form-label">Nova Senha</label>
                        <input type="password" th:field="*{senha}" class="form-input" placeholder="Deixa em branco para não alterar"/>
                        <span th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}" class="field-error"></span>
                    </div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary"><i class="bi bi-floppy-fill me-2"></i>Guardar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
<style>
.perfil-header-card {
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
    border: 1px solid rgba(99,102,241,0.25);
    border-radius: var(--radius);
    padding: 1.75rem;
    display: flex; align-items: center; gap: 1.5rem;
    margin-bottom: 1.25rem;
}
.perfil-avatar {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent-purple));
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.75rem; font-weight: 800; color: white;
    flex-shrink: 0;
}
.perfil-info h2 { font-size: 1.25rem; font-weight: 700; }
.perfil-info p { color: var(--text-muted); font-size: 0.875rem; margin: 0.15rem 0 0.5rem; }
</style>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
