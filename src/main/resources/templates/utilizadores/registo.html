<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Registo | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card" style="max-width:480px">
        <div class="login-brand">
            <div class="login-logo">⚡</div>
            <h1 class="login-title">Criar Conta</h1>
            <p class="login-subtitle">Junta-te ao Tarefeiro</p>
        </div>
        <div th:if="${erro}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${erro}"></span>
        </div>
        <form th:action="@{/utilizadores/registo}" th:object="${utilizadorDTO}" method="post" class="login-form">
            <div class="form-group">
                <label class="form-label">Nome Completo</label>
                <div class="input-with-icon">
                    <i class="bi bi-person-fill input-icon"></i>
                    <input type="text" th:field="*{nome}" class="form-input" placeholder="O teu nome" required/>
                </div>
                <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <div class="input-with-icon">
                    <i class="bi bi-envelope-fill input-icon"></i>
                    <input type="email" th:field="*{email}" class="form-input" placeholder="o-teu@email.pt" required/>
                </div>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="field-error"></span>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <div class="input-with-icon">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" th:field="*{senha}" class="form-input" placeholder="Mínimo 6 caracteres" required/>
                </div>
                <span th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}" class="field-error"></span>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-login">
                <i class="bi bi-person-plus-fill me-2"></i>Criar Conta
            </button>
        </form>
        <div class="login-footer">
            <span>Já tens conta?</span>
            <a th:href="@{/login}">Faz login</a>
        </div>
    </div>
</div>
</body>
</html>
