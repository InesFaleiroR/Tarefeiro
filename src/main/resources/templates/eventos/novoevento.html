<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Novo Evento | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">Tarefeiro</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/regras}" class="nav-link"><i class="bi bi-lightning-charge-fill"></i><span>Regras</span></a>
        <a th:href="@{/eventos}" class="nav-link active"><i class="bi bi-calendar-event-fill"></i><span>Eventos</span></a>
        <a th:href="@{/execucoes}" class="nav-link"><i class="bi bi-play-circle-fill"></i><span>Execuções</span></a>
        <a th:href="@{/ia}" class="nav-link"><i class="bi bi-stars"></i><span>IA Assistant</span></a>
        <div class="nav-divider"></div>
        <a th:href="@{/utilizadores/perfil}" class="nav-link"><i class="bi bi-person-fill"></i><span>Perfil</span></a>
        <a th:href="@{/logout}" class="nav-link nav-link-danger"><i class="bi bi-box-arrow-left"></i><span>Sair</span></a>
    </nav>
</div>
<div class="main-wrapper">
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <div class="topbar-left">
            <a th:href="@{/eventos}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Eventos</a>
            <h1 class="page-title">Novo Evento</h1>
        </div>
    </header>
    <div class="content-area">
        <div class="form-page-container">
            <form th:action="@{/eventos/novo}" th:object="${eventoDTO}" method="post" class="form-card">
                <div class="form-section">
                    <h3 class="form-section-title"><i class="bi bi-calendar-event me-2"></i>Detalhes do Evento</h3>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label required">Tipo de Evento</label>
                            <select th:field="*{tipo}" class="form-select">
                                <option value="">Seleciona o tipo...</option>
                                <option th:each="t : ${tiposEvento}" th:value="${t.name()}" th:text="${t.descricao}"></option>
                            </select>
                            <span th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}" class="field-error"></span>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Fonte</label>
                            <input type="text" th:field="*{fonte}" class="form-input" placeholder="Ex: Gmail, Manual, Webhook"/>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label required">Título</label>
                        <input type="text" th:field="*{titulo}" class="form-input" placeholder="Título descritivo do evento"/>
                        <span th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}" class="field-error"></span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Descrição</label>
                        <textarea th:field="*{descricao}" class="form-textarea" rows="3" placeholder="Informação adicional sobre o evento..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Payload (JSON opcional)</label>
                        <textarea th:field="*{payload}" class="form-textarea" rows="3" placeholder='{"url": "...", "remetente": "..."}'></textarea>
                        <small class="form-hint">Dados adicionais em formato JSON para as regras processarem.</small>
                    </div>
                </div>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-actions">
                    <a th:href="@{/eventos}" class="btn btn-ghost">Cancelar</a>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-calendar-plus-fill me-2"></i>Criar Evento</button>
                </div>
            </form>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
