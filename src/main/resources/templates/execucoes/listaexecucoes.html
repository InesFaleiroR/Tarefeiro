<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Execuções | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="sidebar" id="sidebar">
    <div class="sidebar-brand"><span class="brand-icon">⚡</span><span class="brand-name">Tarefeiro</span></div>
    <nav class="sidebar-nav">
        <a th:href="@{/dashboard}" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a>
        <a th:href="@{/regras}" class="nav-link"><i class="bi bi-lightning-charge-fill"></i><span>Regras</span></a>
        <a th:href="@{/eventos}" class="nav-link"><i class="bi bi-calendar-event-fill"></i><span>Eventos</span></a>
        <a th:href="@{/execucoes}" class="nav-link active"><i class="bi bi-play-circle-fill"></i><span>Execuções</span></a>
        <a th:href="@{/ia}" class="nav-link"><i class="bi bi-stars"></i><span>IA Assistant</span></a>
        <div class="nav-divider"></div>
        <a th:href="@{/utilizadores/perfil}" class="nav-link"><i class="bi bi-person-fill"></i><span>Perfil</span></a>
        <a th:href="@{/logout}" class="nav-link nav-link-danger"><i class="bi bi-box-arrow-left"></i><span>Sair</span></a>
    </nav>
</div>
<div class="main-wrapper">
    <header class="topbar">
        <button class="sidebar-toggle" id="sidebarToggle"><i class="bi bi-list"></i></button>
        <div class="topbar-left"><h1 class="page-title">Histórico de Execuções</h1></div>
        <div class="topbar-right">
            <div class="user-chip"><div class="user-avatar" th:text="${#strings.substring(utilizador.nome, 0, 1)}">U</div></div>
        </div>
    </header>
    <div class="content-area">
        <div th:if="${execucoes.empty}" class="empty-state-large">
            <div class="empty-icon"><i class="bi bi-clock-history"></i></div>
            <h3>Sem execuções ainda</h3>
            <p>Quando as tuas regras forem ativadas, o histórico aparece aqui.</p>
            <a th:href="@{/regras}" class="btn btn-primary"><i class="bi bi-lightning-charge me-2"></i>Ver Regras</a>
        </div>
        <div th:unless="${execucoes.empty}" class="table-card">
            <table class="data-table">
                <thead>
                    <tr><th>Estado</th><th>Regra</th><th>Ação</th><th>Duração</th><th>Tentativas</th><th>Data</th><th></th></tr>
                </thead>
                <tbody>
                    <tr th:each="ex : ${execucoes.content}">
                        <td>
                            <span th:class="${ex.estado.name() == 'SUCESSO' ? 'badge badge-success' : (ex.estado.name() == 'FALHA' ? 'badge badge-danger' : 'badge badge-warning')}"
                                  th:text="${ex.estado.descricao}"></span>
                        </td>
                        <td th:text="${ex.regra.nome}">Regra</td>
                        <td th:text="${ex.regra.acaoTipo}">Ação</td>
                        <td th:text="${ex.duracaoMs != null ? ex.duracaoMs + ' ms' : '-'}">-</td>
                        <td th:text="${ex.tentativas}">0</td>
                        <td th:text="${#temporals.format(ex.iniciadoEm, 'dd/MM HH:mm')}"></td>
                        <td>
                            <a th:href="@{/execucoes/{id}(id=${ex.id})}" class="btn-icon"><i class="bi bi-eye"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div class="pagination" th:if="${execucoes.totalPages > 1}">
                <a th:href="@{/execucoes(page=${execucoes.number - 1})}" th:if="${execucoes.hasPrevious()}" class="page-btn"><i class="bi bi-chevron-left"></i></a>
                <span class="page-info" th:text="'Página ' + (${execucoes.number + 1}) + ' de ' + ${execucoes.totalPages}"></span>
                <a th:href="@{/execucoes(page=${execucoes.number + 1})}" th:if="${execucoes.hasNext()}" class="page-btn"><i class="bi bi-chevron-right"></i></a>
            </div>
        </div>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
