<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | O Tarefeiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link rel="stylesheet" th:href="@{/css/login.css}"/>
</head>
<body class="login-body">
<div class="login-container">
    <div class="login-card">
        <div class="login-brand">
            <div class="login-logo">⚡</div>
            <h1 class="login-title">O Tarefeiro</h1>
            <p class="login-subtitle">O teu assistente de automação inteligente</p>
        </div>

        <div th:if="${param.erro}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Email ou senha incorretos. Tenta novamente.
        </div>
        <div th:if="${param.saiu}" class="alert alert-success">
            <i class="bi bi-check-circle-fill me-2"></i>
            Sessão terminada com sucesso!
        </div>
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

        <form th:action="@{/login}" method="post" class="login-form">
            <div class="form-group">
                <label class="form-label">Email</label>
                <div class="input-with-icon">
                    <i class="bi bi-envelope-fill input-icon"></i>
                    <input type="email" name="email" class="form-input" placeholder="o-teu@email.pt" required autofocus/>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Senha</label>
                <div class="input-with-icon">
                    <i class="bi bi-lock-fill input-icon"></i>
                    <input type="password" name="senha" id="senhaInput" class="form-input" placeholder="••••••••" required/>
                    <button type="button" class="toggle-password" onclick="toggleSenha()">
                        <i class="bi bi-eye-fill" id="toggleIcon"></i>
                    </button>
                </div>
            </div>
            <div class="form-check-row">
                <label class="check-label">
                    <input type="checkbox" name="remember-me"/>
                    <span>Lembrar-me</span>
                </label>
            </div>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-login">
                <i class="bi bi-lightning-charge-fill me-2"></i>Entrar
            </button>
        </form>

        <div class="login-footer">
            <span>Ainda não tens conta?</span>
            <a th:href="@{/utilizadores/registo}">Regista-te aqui</a>
        </div>
    </div>
    <div class="login-decoration">
        <div class="deco-card">
            <i class="bi bi-lightning-charge"></i>
            <span>Automação inteligente</span>
        </div>
        <div class="deco-card">
            <i class="bi bi-stars"></i>
            <span>IA integrada</span>
        </div>
        <div class="deco-card">
            <i class="bi bi-shield-check"></i>
            <span>Seguro e privado</span>
        </div>
    </div>
</div>

<script>
function toggleSenha() {
    const input = document.getElementById('senhaInput');
    const icon = document.getElementById('toggleIcon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash-fill';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye-fill';
    }
}
</script>
</body>
</html>
