<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>404 | O Tarefeiro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#0f172a; color:#e2e8f0; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .error-page { text-align:center; padding:3rem; }
        .error-icon { font-size:5rem; color:#6366f1; margin-bottom:1rem; }
        .error-code { font-size:7rem; font-weight:800; color:#6366f1; line-height:1; }
        .error-title { font-size:1.5rem; font-weight:600; margin:1rem 0 0.5rem; }
        .error-msg { color:#94a3b8; margin-bottom:2rem; }
        .error-btn { background:#6366f1; color:white; padding:0.75rem 2rem; border-radius:0.75rem; text-decoration:none; font-weight:600; display:inline-flex; align-items:center; gap:0.5rem; }
        .error-btn:hover { background:#4f46e5; }
    </style>
</head>
<body>
<div class="error-page">
    <div class="error-icon"><i class="bi bi-search"></i></div>
    <div class="error-code">404</div>
    <h1 class="error-title">Página não encontrada</h1>
    <p class="error-msg">Oops! A página que procuras não existe ou foi movida.</p>
    <a href="/dashboard" class="error-btn"><i class="bi bi-house-fill"></i>Voltar ao início</a>
</div>
</body>
</html>
