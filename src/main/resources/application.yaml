spring:
  application:
    name: o-tarefeiro

  # ── Base de Dados ─────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:Tarefeiro}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:12345}
    driver-class-name: org.postgresql.Driver

    hikari:
      pool-name: TarefeiroHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false
    open-in-view: false

    properties:
      hibernate:
        format_sql: false
        default_schema: public

        jdbc:
          time_zone: UTC
          batch_size: 25
          batch_versioned_data: true

        order_inserts: true
        order_updates: true

  # ── Flyway ────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Thymeleaf ─────────────────────────────────────────────────────
  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  # ── Email (SMTP) ──────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}

    properties:
      mail:
        smtp:
          auth: true

          starttls:
            enable: true

  # ── Jackson ───────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false

    time-zone: Europe/Lisbon

    default-property-inclusion: NON_NULL

  # ── DevTools ──────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: true

    livereload:
      enabled: true

# ── Servidor ──────────────────────────────────────────────────────
server:
  port: ${PORT:8081}

  servlet:
    context-path: /

    session:
      timeout: 7d

      cookie:
        http-only: true
        secure: false

  error:
    whitelabel:
      enabled: false

# ── Actuator ──────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator

      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: when-authorized

  info:
    app:
      enabled: true

# ── OpenAI ────────────────────────────────────────────────────────
openai:
  api:
    key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    timeout-seconds: 30
    max-tokens: 1000

# ── Configuração Tarefeiro ───────────────────────────────────────
tarefeiro:

  jwt:
    secret: ${JWT_SECRET:dGFyZWZlaXJvLXNlY3JldC1rZXktMjAyNS1zdXBlci1zZWN1cmUtcGxlYXNlLWNoYW5nZS1pbi1wcm9kdWN0aW9u}

    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

    refresh-expiration-ms: ${JWT_REFRESH_MS:604800000}

  webhook:
    secret: ${WEBHOOK_SECRET:webhook-secret-alterar-em-producao}

  automacao:
    intervalo-verificacao-ms: ${AUTOMACAO_INTERVALO_MS:60000}
    max-tentativas: 3
    timeout-execucao-ms: 30000

# ── Logging ───────────────────────────────────────────────────────
logging:

  level:
    root: INFO

    com.tarefeiro: DEBUG

    org.springframework.security: WARN

    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"